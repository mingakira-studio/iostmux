name: Issue Agent

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  analyze:
    runs-on: self-hosted
    if: startsWith(github.event.label.name, 'auto:')
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        if: github.event.label.name == 'auto:fix' || github.event.label.name == 'auto:feat'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Process issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          LABEL: ${{ github.event.label.name }}
          REPO: ${{ github.repository }}
        run: |
          FIX_LOG="$HOME/.cache/gh-fix-log.json"
          mkdir -p "$(dirname "$FIX_LOG")"
          [ -f "$FIX_LOG" ] || echo '[]' > "$FIX_LOG"
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          REPO_NAME=$(echo "$REPO" | cut -d/ -f2)

          log_result() {
            local action="$1" result="$2" detail="$3" pr_num="${4:-}"
            python3 -c "
          import json, sys
          with open('$FIX_LOG') as f: data = json.load(f)
          data.append({
              'issue_number': $ISSUE_NUMBER,
              'repo': '$REPO_NAME',
              'title': $(python3 -c "import json; print(json.dumps('$ISSUE_TITLE'))"),
              'timestamp': '$TIMESTAMP',
              'action': '$action',
              'result': '$result',
              'detail': $(python3 -c "import json; print(json.dumps('''$detail'''))"),
              'pr_number': ${pr_num:-0},
          })
          with open('$FIX_LOG', 'w') as f: json.dump(data[-50:], f, indent=2)
          "
          }

          if [ "$LABEL" = "auto:analyze" ]; then
            echo "::group::Codex analysis"
            ANALYSIS=$(codex exec "Analyze this issue concisely.

          Issue: $ISSUE_TITLE
          Body: $ISSUE_BODY

          Provide:
          1. Root cause analysis (if bug)
          2. Affected files (list paths)
          3. Complexity (simple/medium/complex)
          4. Suggested approach
          5. Estimated effort" 2>&1 | tee /tmp/codex-analysis.log || echo "Analysis failed")
            echo "::endgroup::"

            gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "## AI Analysis

          $ANALYSIS

          ---
          *Automated analysis by Codex*"

            log_result "analyze" "done" "$ANALYSIS"

          elif [ "$LABEL" = "auto:fix" ] || [ "$LABEL" = "auto:feat" ]; then
            BRANCH="auto/${LABEL#auto:}-issue-${ISSUE_NUMBER}"
            git fetch origin main
            git checkout -B "$BRANCH" origin/main

            echo "::group::Codex execution"
            CODEX_OUTPUT=$(codex exec --full-auto "Fix this issue. Make minimal, focused changes. Run tests if possible.

          Issue: $ISSUE_TITLE
          Body: $ISSUE_BODY" 2>&1 | tee /tmp/codex-output.log || echo "Codex execution failed")
            echo "::endgroup::"
            echo "--- Codex output (last 30 lines) ---"
            tail -30 /tmp/codex-output.log 2>/dev/null || true

            if [ -n "$(git status --porcelain)" ]; then
              CHANGED_FILES=$(git diff --name-only HEAD)
              git add -A
              git commit -m "${LABEL#auto:}: $ISSUE_TITLE (closes #$ISSUE_NUMBER)"
              git push -u origin "$BRANCH"

              PR_BODY_FILE="/tmp/issue-agent-pr-body.md"
              printf "Closes #%s\n\nChanged files: %s\n\n---\nAuto-generated by Codex Issue Agent\n" "$ISSUE_NUMBER" "$CHANGED_FILES" > "$PR_BODY_FILE"

              PR_URL=$(gh pr create --repo "$REPO" \
                --title "${LABEL#auto:}: $ISSUE_TITLE" \
                --base main \
                --head "$BRANCH" \
                --body-file "$PR_BODY_FILE" \
                --label "auto-merge" 2>&1) || echo "PR create failed: $PR_URL"

              PR_NUM=$(echo "$PR_URL" | grep -oE '[0-9]+$' || echo "0")

              CODEX_SUMMARY=$(echo "$CODEX_OUTPUT" | tail -20)
              COMMENT_FILE="/tmp/issue-agent-comment.md"
              printf "PR #%s created automatically. Will auto-merge after checks pass.\n\nChanged files: %s\n" "$PR_NUM" "$CHANGED_FILES" > "$COMMENT_FILE"
              printf "\n<details>\n<summary>Agent analysis</summary>\n\n%s\n</details>\n" "$CODEX_SUMMARY" >> "$COMMENT_FILE"
              gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body-file "$COMMENT_FILE"

              log_result "${LABEL#auto:}" "pr_created" "Changed: $CHANGED_FILES" "$PR_NUM"
            else
              # Include Codex analysis in the comment so dashboard can show what agent tried
              CODEX_SUMMARY=$(echo "$CODEX_OUTPUT" | tail -30)
              COMMENT_FILE="/tmp/issue-agent-fail.md"
              printf "Auto-fix attempted but no changes were made. Manual intervention needed.\n\n## Agent Analysis\n\n%s\n\n---\n*Codex analyzed but could not produce a fix.*\n" "$CODEX_SUMMARY" > "$COMMENT_FILE"
              gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body-file "$COMMENT_FILE"

              log_result "${LABEL#auto:}" "no_changes" "Codex ran but made no changes"

              # Escalate: label needs-human + assign + notify
              bash "$HOME/workspace/scripts/gtd_escalate_failure.sh" \
                "$REPO" "issue-agent" "$ISSUE_NUMBER" \
                "Codex made no changes for: $ISSUE_TITLE" || true
            fi
          fi
