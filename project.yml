name: iostmux
options:
  bundleIdPrefix: com.ming
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    branch: main
  Citadel:
    url: https://github.com/orlandos-nl/Citadel
    from: "0.1.0"
targets:
  iostmux:
    type: application
    platform: iOS
    sources:
      - iostmux
    dependencies:
      - package: SwiftTerm
      - package: Citadel
    settings:
      base:
        DEVELOPMENT_TEAM: SSG79B289M
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Voice input for Claude Code sessions"
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Convert speech to text for terminal input"
        INFOPLIST_KEY_UIBackgroundModes: [fetch, processing]
        TARGETED_DEVICE_FAMILY: "1"
